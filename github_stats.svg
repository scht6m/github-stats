<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="terminal" baseProfile="full" viewBox="0 0 460 400" width="550" version="1.1">
    <style type="text/css">
        <![CDATA[
        /* Palette. Every colour comes from the selected theme. */
        .bg     { fill: #000000 }
        .fg     { fill: #0FF5EC }
        .cursor { fill: #0FF5EC }
        .user   { fill: #0FF5EC }
        .name   { fill: #0FF5EC }
        .logo   { fill: #0FF5EC }
        .label  { fill: #0FF5EC }
        .value  { fill: #0FF5EC }
        .uptime { fill: #0FF5EC }

        /* Text sits on a fixed 8px x 17px character grid. Every <text> carries a
           textLength of 8 * (its character count) so the layout holds together
           whatever monospace font the viewer's browser falls back to. */
        #screen { font-family: 'DejaVu Sans Mono', Menlo, Consolas, monospace; font-size: 14px }
        text    { dominant-baseline: text-before-edge; white-space: pre }

        /* One shared timeline. Each animated element names its own slice of it
           as a percentage, so the duration below is the only speed control:
           raise it and the whole sequence slows proportionally. At 16s, 1% is
           160ms. Elements are authored in their finished state and the
           animation rewinds them, which keeps the SVG readable as a plain
           transcript if animations never run. */
        .an { animation-duration: 16s; animation-iteration-count: infinite; animation-timing-function: linear }

        /* Prompts fade in and stay. */
        @keyframes p0  { 0%          { opacity: 0; animation-timing-function: ease-out } 2.4%,  100% { opacity: 1 } }
        @keyframes p2  { 0%, 11.3%   { opacity: 0; animation-timing-function: ease-out } 13.7%, 100% { opacity: 1 } }
        @keyframes p14 { 0%, 33.8%   { opacity: 0; animation-timing-function: ease-out } 36.2%, 100% { opacity: 1 } }
        @keyframes p16 { 0%, 45.1%   { opacity: 0; animation-timing-function: ease-out } 47.5%, 100% { opacity: 1 } }

        /* Cursors arrive with their prompt and leave on Enter. The last one is
           what the shell leaves behind once exit has run: no further prompt,
           just a cursor, so it stays. */
        @keyframes c0  { 0%        { opacity: 0; animation-timing-function: ease-out } 2.4%,  9.9%  { opacity: 1 } 10.5%, 100% { opacity: 0 } }
        @keyframes c2  { 0%, 11.3% { opacity: 0; animation-timing-function: ease-out } 13.7%, 23%   { opacity: 1 } 23.6%, 100% { opacity: 0 } }
        @keyframes c14 { 0%, 33.8% { opacity: 0; animation-timing-function: ease-out } 36.2%, 43.7% { opacity: 1 } 44.3%, 100% { opacity: 0 } }
        @keyframes c16 { 0%, 45.1% { opacity: 0; animation-timing-function: ease-out } 47.5%, 53.2% { opacity: 1 } 53.8%, 100% { opacity: 0 } }
        @keyframes c18 { 0%, 54.6% { opacity: 0; animation-timing-function: ease-out } 57%,   100% { opacity: 1 } }
        @keyframes blink { 0%, 49.9% { opacity: 1 } 50%, 100% { opacity: 0 } }
        .blink { animation: blink 1s linear infinite }

        /* Typing: a background-coloured mask slides right one character per
           step (~144ms), uncovering the command a letter at a time with the
           cursor riding its leading edge. Even spacing is what makes it read as
           typing rather than as a stutter. */
        @keyframes t0  { 0%, 3.2%  { transform: translateX(0); animation-timing-function: steps(6, end) } 8.6%,  100% { transform: translateX(48px) } }
        @keyframes t2  { 0%, 14.5% { transform: translateX(0); animation-timing-function: steps(8, end) } 21.7%, 100% { transform: translateX(64px) } }
        @keyframes t14 { 0%, 37%   { transform: translateX(0); animation-timing-function: steps(6, end) } 42.4%, 100% { transform: translateX(48px) } }
        @keyframes t16 { 0%, 48.3% { transform: translateX(0); animation-timing-function: steps(4, end) } 51.9%, 100% { transform: translateX(32px) } }

        /* Output lines settle in from just below, ~112ms apart, so a block
           prints as a wave down the screen instead of appearing all at once. */
        @keyframes o1  { 0%, 9.9%  { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 12.3%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n0  { 0%, 23%   { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 25.4%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n1  { 0%, 23.7% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 26.1%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n2  { 0%, 24.4% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 26.8%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n3  { 0%, 25.1% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 27.5%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n4  { 0%, 25.8% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 28.2%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n5  { 0%, 26.5% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 28.9%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n6  { 0%, 27.2% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 29.6%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n7  { 0%, 27.9% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 30.3%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n8  { 0%, 28.6% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 31%,   100% { opacity: 1; transform: translateY(0) } }
        @keyframes n9  { 0%, 29.3% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 31.7%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes n10 { 0%, 30%   { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 32.4%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes o15 { 0%, 43.7% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 46.1%, 100% { opacity: 1; transform: translateY(0) } }
        @keyframes o17 { 0%, 53.2% { opacity: 0; transform: translateY(4px); animation-timing-function: ease-out } 55.6%, 100% { opacity: 1; transform: translateY(0) } }
        ]]>
    </style>
    <defs>
        <g id="prompt"><text x="0" textLength="136" class="fg"><tspan class="user" font-weight="bold">scht6m@github</tspan>:<tspan font-weight="bold">~</tspan>$ </text></g>
    </defs>
    <rect class="bg" width="100%" height="100%" ry="4.5826941" />
    <circle cx="24" cy="23" r="7" fill="#f92672" />
    <circle cx="44" cy="23" r="7" fill="#f4bf75" />
    <circle cx="64" cy="23" r="7" fill="#a6e22e" />
    <g id="screen" transform="translate(23, 50)">

        <!-- $ whoami -->
        <g transform="translate(0, 0)">
            <use xlink:href="#prompt" class="an" style="animation-name:p0" />
            <text x="136" textLength="48" class="fg">whoami</text>
            <g transform="translate(136, 0)">
                <g class="an" style="animation-name:t0" transform="translate(48, 0)">
                    <rect class="bg" width="48" height="17" />
                    <g class="an" style="animation-name:c0" opacity="0"><rect class="cursor" y="1" width="8" height="15" /></g>
                </g>
            </g>
        </g>
        <g transform="translate(0, 17)">
            <g class="an" style="animation-name:o1"><text textLength="128" class="name">Andy Azhari Pane</text></g>
        </g>

        <!-- $ neofetch -->
        <g transform="translate(0, 34)">
            <use xlink:href="#prompt" class="an" style="animation-name:p2" />
            <text x="136" textLength="64" class="fg">neofetch</text>
            <g transform="translate(136, 0)">
                <g class="an" style="animation-name:t2" transform="translate(64, 0)">
                    <rect class="bg" width="64" height="17" />
                    <g class="an" style="animation-name:c2" opacity="0"><rect class="cursor" y="1" width="8" height="15" /></g>
                </g>
            </g>
        </g>
        <g transform="translate(0, 51)">
            <g class="an" style="animation-name:n0">
                <rect class="logo" x="80" y="1" width="64" height="14" />
                <text x="240" textLength="104" font-weight="bold" class="user">scht6m@github</text>
            </g>
        </g>
        <g transform="translate(0, 68)">
            <g class="an" style="animation-name:n1">
                <rect class="logo" x="56" y="1" width="112" height="14" />
                <text x="240" textLength="104" class="fg">-------------</text>
            </g>
        </g>
        <g transform="translate(0, 85)">
            <g class="an" style="animation-name:n2">
                <rect class="logo" x="40" y="1" width="24" height="14" />
                <rect class="logo" x="80" y="1" width="64" height="14" />
                <rect class="logo" x="160" y="1" width="24" height="14" />
                <text x="240" textLength="32" class="label">OS: </text>
                <text x="272" textLength="48" class="value">GitHub</text>
            </g>
        </g>
        <g transform="translate(0, 102)">
            <g class="an" style="animation-name:n3">
                <rect class="logo" x="32" y="1" width="32" height="14" />
                <rect class="logo" x="160" y="1" width="32" height="14" />
                <text x="240" textLength="56" class="label">Stars: </text>
                <text x="296" textLength="48" class="value">0     </text>
            </g>
        </g>
        <g transform="translate(0, 119)">
            <g class="an" style="animation-name:n4">
                <rect class="logo" x="32" y="1" width="32" height="14" />
                <rect class="logo" x="160" y="1" width="32" height="14" />
                <text x="240" textLength="56" class="label">Forks: </text>
                <text x="296" textLength="48" class="value">0     </text>
            </g>
        </g>
        <g transform="translate(0, 136)">
            <g class="an" style="animation-name:n5">
                <rect class="logo" x="32" y="1" width="24" height="14" />
                <rect class="logo" x="168" y="1" width="24" height="14" />
                <text x="240" textLength="72" class="label">Commits: </text>
                <text x="312" textLength="48" class="value">1     </text>
            </g>
        </g>
        <g transform="translate(0, 153)">
            <g class="an" style="animation-name:n6">
                <rect class="logo" x="32" y="1" width="32" height="14" />
                <rect class="logo" x="160" y="1" width="32" height="14" />
                <text x="240" textLength="88" class="label">Followers: </text>
                <text x="328" textLength="48" class="value">0     </text>
            </g>
        </g>
        <g transform="translate(0, 170)">
            <g class="an" style="animation-name:n7">
                <rect class="logo" x="32" y="1" width="40" height="14" />
                <rect class="logo" x="152" y="1" width="40" height="14" />
                <text x="240" textLength="120" class="label">Pull Requests: </text>
                <text x="360" textLength="48" class="value">0     </text>
            </g>
        </g>
        <g transform="translate(0, 187)">
            <g class="an" style="animation-name:n8">
                <rect class="logo" x="40" y="1" width="16" height="14" />
                <rect class="logo" x="64" y="1" width="32" height="14" />
                <rect class="logo" x="128" y="1" width="56" height="14" />
                <text x="240" textLength="56" class="label">Repos: </text>
                <text x="296" textLength="48" class="value">2     </text>
            </g>
        </g>
        <g transform="translate(0, 204)">
            <g class="an" style="animation-name:n9">
                <rect class="logo" x="48" y="1" width="16" height="14" />
                <rect class="logo" x="136" y="1" width="40" height="14" />
            </g>
        </g>
        <g transform="translate(0, 221)">
            <g class="an" style="animation-name:n10">
                <rect class="logo" x="72" y="1" width="16" height="14" />
                <rect class="logo" x="136" y="1" width="16" height="14" />
            </g>
        </g>

        <!-- $ uptime -->
        <g transform="translate(0, 238)">
            <use xlink:href="#prompt" class="an" style="animation-name:p14" />
            <text x="136" textLength="48" class="fg">uptime</text>
            <g transform="translate(136, 0)">
                <g class="an" style="animation-name:t14" transform="translate(48, 0)">
                    <rect class="bg" width="48" height="17" />
                    <g class="an" style="animation-name:c14" opacity="0"><rect class="cursor" y="1" width="8" height="15" /></g>
                </g>
            </g>
        </g>
        <g transform="translate(0, 255)">
            <g class="an" style="animation-name:o15"><text textLength="224" class="uptime">0 years, 0 days, 13 hours   </text></g>
        </g>

        <!-- $ exit -->
        <g transform="translate(0, 272)">
            <use xlink:href="#prompt" class="an" style="animation-name:p16" />
            <text x="136" textLength="32" class="fg">exit</text>
            <g transform="translate(136, 0)">
                <g class="an" style="animation-name:t16" transform="translate(32, 0)">
                    <rect class="bg" width="32" height="17" />
                    <g class="an" style="animation-name:c16" opacity="0"><rect class="cursor" y="1" width="8" height="15" /></g>
                </g>
            </g>
        </g>
        <g transform="translate(0, 289)">
            <g class="an" style="animation-name:o17"><text textLength="32" class="fg">exit</text></g>
        </g>

        <!-- the shell has exited: no prompt returns, only a resting cursor -->
        <g transform="translate(0, 306)">
            <g class="an" style="animation-name:c18" opacity="0"><rect class="cursor blink" y="1" width="8" height="15" /></g>
        </g>

    </g>
</svg>
